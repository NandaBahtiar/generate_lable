appId: ${APP_ID}
jsEngine: graaljs

tags:
  - regression
env:
  JIRA_FOLDER_NAME: Enhancement Limit

onFlowStart:
  - runScript:
      file: ../../../automation-env.js
  - runScript:
      file: ../../../configs/general/setSegment.js
      env:
        SEGMENT: PRIORITY

onFlowEnd:
  - runScript:
      file: ../../../configs/general/setSegment.js
      env:
        SEGMENT: MASS

